<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasha Tech | Monitor Económico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --blue: #58a6ff;
            --green: #238636;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px;
        }
        .container { max-width: 1100px; margin: auto; }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; font-weight: 600; }
        .price { font-size: 2.8rem; font-weight: bold; color: #fff; margin: 10px 0; }
        .chart-box { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 20px;
            height: 400px;
        }
        #update-time { font-size: 0.8rem; color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">SASHA <span style="color: var(--blue);">TECH</span></div>
        <div id="update-time">Sincronizando...</div>
    </header>

    <div class="grid">
        <div class="card" style="border-top: 4px solid var(--green);">
            <div class="label">Dólar Oficial (BCV)</div>
            <div id="bcv-val" class="price">--</div>
            <div style="font-size: 0.85rem; color: #8b949e;">Referencia Banco Central</div>
        </div>
        <div class="card" style="border-top: 4px solid var(--blue);">
            <div class="label">Paralelo (Binance P2P)</div>
            <div id="para-val" class="price">--</div>
            <div style="font-size: 0.85rem; color: #8b949e;">Mercado Digital</div>
        </div>
        <div class="card" style="border-top: 4px solid #f2e05d;">
            <div class="label">Promedio General</div>
            <div id="prom-val" class="price">--</div>
            <div style="font-size: 0.85rem; color: #8b949e;">Cálculo de Mercado</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="monitorChart"></canvas>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKygWJAPywCdwum7G_6HCttrL1KYcQFwpOMbNucbI3a_pTlhmyLmipTtBKxLT76Iz4tg1s0fr9Bm4u/pub?output=csv";

    async function updateDashboard() {
        try {
            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`);
            const text = await response.text();
            
            // Separamos por comas (formato estándar de Sheets ahora que es nativo)
            const rows = text.split('\n').map(r => r.split(',')).slice(1);
            
            const labels = [], bcvData = [], paraData = [], promData = [];

            rows.forEach(row => {
                if (row.length >= 4 && row[1].trim() !== "") {
                    labels.push(row[0].split(' ')[0]); // Fecha
                    bcvData.push(parseFloat(row[1]));
                    paraData.push(parseFloat(row[2]));
                    promData.push(parseFloat(row[3]));
                }
            });

            const last = bcvData.length - 1;
            const fmt = (n) => n.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            // Actualizar tarjetas
            document.getElementById('bcv-val').innerText = fmt(bcvData[last]) + " Bs";
            document.getElementById('para-val').innerText = fmt(paraData[last]) + " Bs";
            document.getElementById('prom-val').innerText = fmt(promData[last]) + " Bs";
            document.getElementById('update-time').innerText = "Último registro: " + labels[last];

            // Gráfico profesional
            const ctx = document.getElementById('monitorChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Binance', data: paraData, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.05)', fill: true, tension: 0.3 },
                        { label: 'BCV', data: bcvData, borderColor: '#238636', borderDash: [5, 5], tension: 0.3 },
                        { label: 'Promedio', data: promData, borderColor: '#f2e05d', borderDash: [2, 2], tension: 0.3, hidden: true }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: { legend: { labels: { color: '#c9d1d9' } } },
                    scales: {
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
                    }
                }
            });

        } catch (error) {
            console.error("Error cargando el dashboard:", error);
            document.getElementById('update-time').innerText = "Error de sincronización";
        }
    }

    updateDashboard();
</script>

</body>
</html>
